global:
  scrape_interval: 15s

rule_files:
  - "alert_rules.yml"

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'go_orchestrator'
    static_configs:
      - targets: ['host.docker.internal:8080']

  - job_name: 'python_intent_engine'
    static_configs:
      - targets: ['host.docker.internal:8000']

  - job_name: 'node_nexus_api'
    static_configs:
      - targets: ['host.docker.internal:4000']
