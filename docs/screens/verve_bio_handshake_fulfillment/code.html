<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-variant": "#313635",
                    "on-surface": "#dfe3e2",
                    "error-container": "#93000a",
                    "on-secondary": "#003919",
                    "surface-container-highest": "#313635",
                    "error": "#ffb4ab",
                    "primary-fixed-dim": "#76d6d5",
                    "surface-container-low": "#181c1c",
                    "surface-bright": "#353a3a",
                    "on-secondary-fixed": "#00210c",
                    "inverse-on-surface": "#2c3131",
                    "secondary-fixed-dim": "#66dd8b",
                    "on-tertiary-fixed": "#341100",
                    "on-background": "#dfe3e2",
                    "aura-teal": "#008080",
                    "outline": "#879392",
                    "tertiary-fixed-dim": "#ffb692",
                    "primary-container": "#008080",
                    "on-tertiary-container": "#fff9f7",
                    "on-secondary-container": "#003115",
                    "surface-container-lowest": "#0a0f0f",
                    "surface-container": "#1c2020",
                    "inverse-primary": "#006a6a",
                    "surface-dim": "#121212",
                    "on-error-container": "#ffdad6",
                    "inverse-surface": "#dfe3e2",
                    "on-primary-container": "#e3fffe",
                    "vital-emerald": "#50C878",
                    "secondary-container": "#25a55a",
                    "surface-container-high": "#262b2b",
                    "on-tertiary-fixed-variant": "#733512",
                    "surface": "#101414",
                    "on-primary-fixed-variant": "#004f4f",
                    "tertiary": "#ffb692",
                    "text-primary": "#FFFFFF",
                    "background": "#000000",
                    "secondary-fixed": "#83fba5",
                    "on-error": "#690005",
                    "secondary": "#66dd8b",
                    "primary-fixed": "#93f2f2",
                    "on-surface-variant": "#bdc9c8",
                    "tertiary-container": "#a96039",
                    "outline-variant": "#3e4949",
                    "on-primary": "#003737",
                    "on-secondary-fixed-variant": "#005227",
                    "on-tertiary": "#552000",
                    "tertiary-fixed": "#ffdbcb",
                    "on-primary-fixed": "#002020",
                    "surface-tint": "#76d6d5",
                    "primary": "#76d6d5",
                    "electric-blue": "#00FFFF"
            },
            "borderRadius": {
                    "DEFAULT": "1rem",
                    "lg": "2rem",
                    "xl": "3rem",
                    "full": "9999px"
            },
            "spacing": {
                    "title-margin-top": "2rem",
                    "tagline-margin-top": "0.5rem",
                    "gutter": "1rem",
                    "container-max": "300px",
                    "section-gap": "3rem"
            },
            "fontFamily": {
                    "label-sm": ["Inter"],
                    "brand-title": ["Inter"],
                    "brand-tagline": ["Inter"],
                    "body-md": ["Inter"],
                    "headline-lg": ["Inter"]
            },
            "fontSize": {
                    "label-sm": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05rem", "fontWeight": "500"}],
                    "brand-title": ["32px", {"lineHeight": "1.2", "letterSpacing": "0.5rem", "fontWeight": "300"}],
                    "brand-tagline": ["12.8px", {"lineHeight": "1.5", "letterSpacing": "0.2rem", "fontWeight": "400"}],
                    "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "headline-lg": ["24px", {"lineHeight": "32px", "fontWeight": "300"}]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .bio-pulse-glow {
            box-shadow: 0 0 80px 20px rgba(0, 255, 255, 0.4);
        }
        .vui-wave-path {
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            animation: dash 3s linear forwards;
        }
        @keyframes dash {
            to { stroke-dashoffset: 0; }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-md overflow-hidden">
<!-- Bio-Handshake State 4 Overlay -->
<main class="fixed inset-0 z-[100] flex flex-col items-center justify-between bg-gradient-to-b from-[#004444] via-aura-teal to-background px-gutter py-16 overflow-hidden">
<!-- Top Status Indicator (Subtle) -->
<div class="w-[300px] flex justify-between items-center opacity-60">
<span class="font-label-sm text-label-sm uppercase tracking-[0.2em] text-white">Secure Link</span>
<span class="material-symbols-outlined text-white" style="font-variation-settings: 'FILL' 1;">leak_add</span>
</div>
<!-- Central Verve Pulse Graphic -->
<div class="relative w-full flex flex-col items-center justify-center flex-grow max-w-[300px]">
<!-- Glowing Orbit Rings -->
<div class="absolute w-72 h-72 border-[8px] border-electric-blue/20 rounded-full bio-pulse-glow"></div>
<div class="absolute w-56 h-56 border-[4px] border-electric-blue/40 rounded-full"></div>
<!-- VUI Interface: The Pulse Wave -->
<div class="relative z-10 w-full h-48 flex items-center justify-center">
<svg class="w-full" viewbox="0 0 300 100">
<!-- Fluid Pulse Wave -->
<path class="vui-wave-path" d="M0,50 Q40,50 60,50 T100,50 T140,50 Q150,10 160,50 T200,50 T260,50 T300,50" fill="none" stroke="white" stroke-linecap="round" stroke-width="8"></path>
<!-- The Nexus Core -->
<circle class="animate-pulse" cx="150" cy="20" fill="#50C878" r="12">
<title>Nexus Core</title>
</circle>
</svg>
</div>
<!-- Handshake Caption -->
<div class="mt-8 text-center">
<h1 class="font-brand-title text-brand-title text-white uppercase mb-2">Syncing</h1>
<p class="font-brand-tagline text-brand-tagline text-white/70">Biometric Authentication Active</p>
</div>
</div>
<!-- Cryptographic Handshake Status Bar -->
<div class="w-[300px] space-y-4">
<div class="h-2 w-full bg-white/10 rounded-full overflow-hidden">
<div class="h-full bg-electric-blue w-2/3 shadow-[0_0_15px_rgba(0,255,255,0.8)]"></div>
</div>
<div class="flex justify-between items-center font-label-sm text-[10px] text-white/50 tracking-widest uppercase">
<span>BLE_TOKEN_EXCHANGE</span>
<span class="text-electric-blue">68%</span>
</div>
</div>
<!-- Rider Identified Block -->
<div class="mt-section-gap w-[300px] bg-white/5 backdrop-blur-xl border border-white/10 p-6 rounded-lg flex flex-items-center justify-between">
<div class="flex items-center gap-4">
<!-- Color Indicator -->
<div class="w-12 h-12 rounded-full bg-vital-emerald flex items-center justify-center shadow-[0_0_20px_rgba(80,200,120,0.4)]">
<span class="material-symbols-outlined text-black" style="font-variation-settings: 'FILL' 1;">person</span>
</div>
<div>
<span class="block font-label-sm text-label-sm text-white/60 uppercase">Rider Identified</span>
<span class="block font-headline-lg text-headline-lg text-white font-bold tracking-widest">TUNDE</span>
</div>
</div>
<div class="flex items-center">
<span class="material-symbols-outlined text-vital-emerald text-3xl">verified</span>
</div>
</div>
<!-- Background Atmospheric Element -->
<div class="absolute inset-0 pointer-events-none opacity-20">
<div class="absolute top-1/4 -left-20 w-64 h-64 bg-electric-blue rounded-full blur-[120px]"></div>
<div class="absolute bottom-1/4 -right-20 w-64 h-64 bg-vital-emerald rounded-full blur-[120px]"></div>
</div>
</main>
</body></html>
