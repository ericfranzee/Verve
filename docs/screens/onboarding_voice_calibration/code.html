<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&amp;family=JetBrains+Mono:wght@400;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-variant": "#313635",
                        "inverse-primary": "#006a6a",
                        "on-background": "#dfe3e2",
                        "on-tertiary-fixed-variant": "#733512",
                        "inverse-on-surface": "#2c3131",
                        "surface-container-high": "#262b2b",
                        "surface": "#101414",
                        "primary-fixed-dim": "#76d6d5",
                        "aura-teal": "#008080",
                        "surface-dim": "#101414",
                        "text-primary": "#FFFFFF",
                        "tertiary-container": "#a96039",
                        "error-container": "#93000a",
                        "on-tertiary-container": "#fff9f7",
                        "on-secondary-fixed": "#00210c",
                        "on-primary": "#003737",
                        "tertiary-fixed": "#ffdbcb",
                        "tertiary-fixed-dim": "#ffb692",
                        "secondary": "#66dd8b",
                        "secondary-container": "#25a55a",
                        "surface-tint": "#76d6d5",
                        "surface-container-low": "#181c1c",
                        "inverse-surface": "#dfe3e2",
                        "error": "#ffb4ab",
                        "outline": "#879392",
                        "on-error-container": "#ffdad6",
                        "primary-fixed": "#93f2f2",
                        "on-primary-fixed": "#002020",
                        "vital-emerald": "#50C878",
                        "on-tertiary-fixed": "#341100",
                        "outline-variant": "#3e4949",
                        "on-secondary": "#003919",
                        "surface-container": "#1c2020",
                        "secondary-fixed": "#83fba5",
                        "tertiary": "#ffb692",
                        "surface-container-highest": "#313635",
                        "on-primary-container": "#e3fffe",
                        "secondary-fixed-dim": "#66dd8b",
                        "background": "#000000",
                        "on-secondary-fixed-variant": "#005227",
                        "primary-container": "#008080",
                        "on-error": "#690005",
                        "on-surface-variant": "#bdc9c8",
                        "surface-bright": "#353a3a",
                        "on-surface": "#dfe3e2",
                        "primary": "#76d6d5",
                        "on-tertiary": "#552000",
                        "on-primary-fixed-variant": "#004f4f",
                        "on-secondary-container": "#003115",
                        "surface-container-lowest": "#0a0f0f"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "tagline-margin-top": "0.5rem",
                        "title-margin-top": "2rem",
                        "section-gap": "3rem",
                        "container-max": "300px",
                        "gutter": "1rem"
                    },
                    "fontFamily": {
                        "brand-tagline": ["Inter"],
                        "body-md": ["Inter"],
                        "label-sm": ["Inter"],
                        "headline-lg": ["Inter"],
                        "brand-title": ["Inter"],
                        "mono": ["JetBrains Mono"]
                    },
                    "fontSize": {
                        "brand-tagline": ["12.8px", {"lineHeight": "1.5", "letterSpacing": "0.2rem", "fontWeight": "400"}],
                        "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "label-sm": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05rem", "fontWeight": "500"}],
                        "headline-lg": ["24px", {"lineHeight": "32px", "fontWeight": "300"}],
                        "brand-title": ["32px", {"lineHeight": "1.2", "letterSpacing": "0.5rem", "fontWeight": "300"}]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .vui-pulse-gradient {
            background: radial-gradient(circle at center, rgba(0, 128, 128, 0.2) 0%, rgba(0, 0, 0, 0) 70%);
        }
        .glass-panel {
            background: rgba(18, 18, 18, 0.4);
            backdrop-filter: blur(10px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md overflow-hidden">
<!-- Top Navigation Anchor (Suppressed context check: This is onboarding/transactional, TopAppBar is centered but simplified) -->
<header class="fixed top-0 w-full h-16 flex justify-center items-center px-gutter z-50">
<div class="font-brand-title text-brand-title text-primary tracking-[0.5rem]">VERVE</div>
</header>
<main class="flex-1 flex flex-col items-center justify-center px-gutter max-w-[300px] mx-auto text-center relative">
<!-- Wave/Pulse Interface -->
<div class="w-full aspect-square relative flex items-center justify-center mb-12">
<!-- Atmospheric Glow -->
<div class="absolute inset-0 vui-pulse-gradient rounded-full animate-pulse"></div>
<!-- Aura Breathing Wave (The Pulse) -->
<svg class="w-full h-auto drop-shadow-[0_0_15px_rgba(0,128,128,0.5)]" viewbox="0 0 200 100">
<path class="opacity-80" d="M 0 50 Q 25 20 50 50 T 100 50 T 150 50 T 200 50" fill="transparent" stroke="#008080" stroke-linecap="round" stroke-width="4">
</path>
<path class="opacity-40" d="M 0 50 Q 25 80 50 50 T 100 50 T 150 50 T 200 50" fill="transparent" stroke="#008080" stroke-linecap="round" stroke-width="2">
</path>
<!-- The Nexus Core -->
<circle class="animate-pulse shadow-[0_0_20px_#50C878]" cx="100" cy="50" fill="#50C878" r="6"></circle>
</svg>
</div>
<!-- Typography Cluster -->
<section class="space-y-4 mb-section-gap">
<h1 class="font-headline-lg text-headline-lg text-text-primary">Finding your frequency.</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Say <span class="text-aura-teal">"Aura, provision the essentials"</span> to calibrate your unique voice vector.</p>
</section>
<!-- Technical Data Bento-ish Layout -->
<div class="grid grid-cols-2 gap-2 w-full font-mono text-[10px] uppercase tracking-tighter opacity-60">
<div class="flex flex-col items-start p-3 rounded-lg bg-surface-container-low border border-outline-variant/10">
<span class="text-aura-teal mb-1">Harmonic_ID</span>
<span class="text-on-surface">V-102.899</span>
</div>
<div class="flex flex-col items-start p-3 rounded-lg bg-surface-container-low border border-outline-variant/10">
<span class="text-aura-teal mb-1">Decibel_N</span>
<span class="text-on-surface">-12.4 DB</span>
</div>
<div class="flex flex-col items-start p-3 rounded-lg bg-surface-container-low border border-outline-variant/10">
<span class="text-aura-teal mb-1">Jitter_RT</span>
<span class="text-on-surface">0.023 MS</span>
</div>
<div class="flex flex-col items-start p-3 rounded-lg bg-surface-container-low border border-outline-variant/10">
<span class="text-aura-teal mb-1">Timbre_S</span>
<span class="text-on-surface">ANALYTIC</span>
</div>
</div>
</main>
<!-- Calibration Progress Area -->
<footer class="fixed bottom-0 w-full max-w-[300px] left-1/2 -translate-x-1/2 pb-12 px-gutter space-y-4">
<div class="flex justify-between items-end mb-2">
<span class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-widest">Vector Stability</span>
<span class="font-mono text-vital-emerald font-bold">65%</span>
</div>
<!-- Progress Bar (The Pulse interaction area logic) -->
<div class="h-2 w-full bg-surface-container-highest rounded-full overflow-hidden">
<div class="h-full bg-vital-emerald w-[65%] rounded-full shadow-[0_0_10px_rgba(80,200,120,0.4)]"></div>
</div>
<!-- Subtle Navigation (Suppressed BottomNavBar for Onboarding) -->
<div class="pt-8 flex justify-center">
<button class="text-on-surface-variant font-label-sm text-label-sm uppercase tracking-[0.2rem] opacity-40 hover:opacity-100 transition-opacity">
                Manual Calibration
            </button>
</div>
</footer>
<!-- Background Elements for Atmospheric Depth -->
<div class="fixed top-0 left-0 w-full h-full pointer-events-none -z-10">
<div class="absolute top-[20%] left-[-10%] w-[40%] h-[40%] bg-aura-teal/5 rounded-full blur-[120px]"></div>
<div class="absolute bottom-[10%] right-[-10%] w-[50%] h-[50%] bg-vital-emerald/5 rounded-full blur-[150px]"></div>
</div>
</body></html>
