<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md overflow-x-hidden selection:bg-aura-teal selection:text-text-primary">
<!-- TopAppBar -->
<header class="bg-surface dark:bg-surface border-b-4 border-surface-variant dark:border-surface-variant flex justify-between items-center w-full px-4 h-16 max-w-[300px] mx-auto sticky top-0 z-40">
<button aria-label="Menu" class="text-on-surface-variant dark:text-on-surface-variant hover:text-primary-fixed-dim transition-colors flex-shrink-0">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">menu</span>
</button>
<h1 class="font-mono text-[16px] text-primary dark:text-primary tracking-[0.15em] uppercase text-center flex-1 truncate px-2">LOGISTICS_HUB</h1>
<button aria-label="Profile" class="text-on-surface-variant dark:text-on-surface-variant hover:text-primary-fixed-dim transition-colors flex-shrink-0">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">account_circle</span>
</button>
</header>
<!-- Main Canvas (The Void) -->
<main class="flex-1 flex flex-col items-center justify-center max-w-[300px] mx-auto px-gutter w-full pb-24">
<!-- The Nexus Core -->
<div class="relative flex flex-col items-center justify-center mt-section-gap mb-section-gap">
<!-- Subtle atmospheric glow (simulated with large blur) -->
<div class="absolute w-32 h-32 bg-aura-teal/10 rounded-full blur-2xl pointer-events-none"></div>
<!-- The Dot -->
<div class="w-4 h-4 bg-vital-emerald rounded-full shadow-[0_0_15px_rgba(80,200,120,0.4)] relative z-10"></div>
</div>
<!-- The Message -->
<div class="text-center mb-section-gap">
<p class="font-mono text-on-surface-variant text-[10px] tracking-[0.2em] uppercase opacity-70">
                [NO_SEMANTIC_DRIFT_DETECTED]
            </p>
</div>
<!-- Actions -->
<div class="flex flex-col gap-4 w-full mt-8">
<button class="w-full py-4 rounded-full border-[8px] border-surface-variant flex items-center justify-center gap-3 text-on-surface hover:border-aura-teal transition-all duration-300 group bg-surface-dim">
<span class="material-symbols-outlined text-aura-teal group-hover:text-primary-fixed-dim" style="font-variation-settings: 'FILL' 0;">mic</span>
<span class="font-label-sm text-label-sm uppercase tracking-widest text-text-primary">Speak to Aura</span>
</button>
<button class="w-full py-3 flex items-center justify-center gap-2 text-on-surface-variant hover:text-text-primary transition-colors">
<span class="font-label-sm text-label-sm uppercase tracking-widest">Manual Sync</span>
</button>
</div>
</main>
<!-- BottomNavBar -->
<nav class="bg-surface-container-lowest dark:bg-surface-container-lowest border-t-8 border-surface-variant dark:border-surface-variant fixed bottom-0 left-0 right-0 flex justify-around items-center h-20 max-w-[300px] mx-auto z-50">
<button class="flex flex-col items-center justify-center text-on-surface-variant dark:text-on-surface-variant px-3 py-1 hover:bg-surface-variant dark:hover:bg-surface-variant transition-colors rounded-lg group">
<span class="material-symbols-outlined mb-1 group-hover:text-primary-fixed-dim transition-colors" style="font-variation-settings: 'FILL' 0;">assignment</span>
<span class="font-label-sm text-label-sm uppercase tracking-widest text-[10px]">Queue</span>
</button>

<span class="material-symbols-outlined mb-1 text-on-primary-container" style="font-variation-settings: 'FILL' 1;">inventory_2</span>

</button>
