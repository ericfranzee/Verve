<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Logistics Hub - Offline Buffer</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "vital-emerald": "#50C878",
                        "on-tertiary-fixed": "#341100",
                        "outline-variant": "#3e4949",
                        "on-secondary": "#003919",
                        "tertiary": "#ffb692",
                        "surface-container-highest": "#313635",
                        "on-primary-container": "#e3fffe",
                        "surface-container": "#1c2020",
                        "secondary-fixed": "#83fba5",
                        "surface-dim": "#121212",
                        "error": "#ffb4ab",
                        "outline": "#879392",
                        "primary-fixed": "#93f2f2",
                        "on-error-container": "#ffdad6",
                        "on-primary-fixed": "#002020",
                        "on-surface": "#dfe3e2",
                        "on-secondary-container": "#003115",
                        "primary": "#76d6d5",
                        "on-tertiary": "#552000",
                        "on-primary-fixed-variant": "#004f4f",
                        "surface-container-lowest": "#0a0f0f",
                        "primary-container": "#008080",
                        "on-secondary-fixed-variant": "#005227",
                        "secondary-fixed-dim": "#66dd8b",
                        "background": "#000000",
                        "on-error": "#690005",
                        "surface-bright": "#353a3a",
                        "on-surface-variant": "#bdc9c8",
                        "primary-fixed-dim": "#76d6d5",
                        "aura-teal": "#008080",
                        "text-primary": "#FFFFFF",
                        "on-background": "#dfe3e2",
                        "surface-variant": "#313635",
                        "inverse-primary": "#006a6a",
                        "inverse-on-surface": "#2c3131",
                        "on-tertiary-fixed-variant": "#733512",
                        "surface-container-high": "#262b2b",
                        "surface": "#101414",
                        "tertiary-fixed-dim": "#ffb692",
                        "secondary": "#66dd8b",
                        "surface-tint": "#76d6d5",
                        "surface-container-low": "#181c1c",
                        "inverse-surface": "#dfe3e2",
                        "secondary-container": "#25a55a",
                        "error-container": "#93000a",
                        "tertiary-container": "#a96039",
                        "on-secondary-fixed": "#00210c",
                        "on-tertiary-container": "#fff9f7",
                        "tertiary-fixed": "#ffdbcb",
                        "on-primary": "#003737"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "section-gap": "3rem",
                        "container-max": "300px",
                        "gutter": "1rem",
                        "tagline-margin-top": "0.5rem",
                        "title-margin-top": "2rem"
                    },
                    "fontFamily": {
                        "brand-title": ["Inter"],
                        "label-sm": ["Inter"],
                        "headline-lg": ["Inter"],
                        "brand-tagline": ["Inter"],
                        "body-md": ["Inter"],
                        "mono": ["Space Mono", "monospace"]
                    },
                    "fontSize": {
                        "brand-title": ["32px", { "lineHeight": "1.2", "letterSpacing": "0.5rem", "fontWeight": "300" }],
                        "label-sm": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05rem", "fontWeight": "500" }],
                        "headline-lg": ["24px", { "lineHeight": "32px", "fontWeight": "300" }],
                        "brand-tagline": ["12.8px", { "lineHeight": "1.5", "letterSpacing": "0.2rem", "fontWeight": "400" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
<style>
        body { background-color: #000000; color: #dfe3e2; }
        .nexus-core {
            box-shadow: 0 0 20px 5px rgba(80, 200, 120, 0.4);
        }
        .aura-wave-desaturated {
            border-top: 8px solid rgba(0, 128, 128, 0.3);
            border-radius: 50%;
            height: 40px;
            width: 200px;
            margin: 0 auto;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background text-on-background font-body-md h-screen flex flex-col items-center justify-center overflow-hidden">
<!-- Top App Bar (From Shared Components) -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-2 h-16 max-w-[300px] mx-auto bg-surface dark:bg-surface border-b-4 border-surface-variant dark:border-surface-variant">
<button aria-label="Menu" class="text-on-surface-variant dark:text-on-surface-variant hover:text-primary-fixed-dim transition-colors p-2">
<span class="material-symbols-outlined text-[24px] text-[20px]">menu</span>
</button>
<h1 class="font-mono text-[14px] text-primary dark:text-primary tracking-[0.25rem] uppercase text-center flex-1 truncate">LOGISTICS_HUB</h1>
<button aria-label="Account" class="text-on-surface-variant dark:text-on-surface-variant hover:text-primary-fixed-dim transition-colors p-2">
<span class="material-symbols-outlined text-[24px] text-[20px]">account_circle</span>
</button>
</header>
<!-- Main Content Area: Centered, max-w-[300px] -->
<main class="flex-1 w-full max-w-container-max flex flex-col mt-16 mb-20 relative">
<!-- Top 60% Morphing Viewport -->
<section class="flex-[0.6] flex flex-col items-center justify-center w-full relative pt-section-gap">
<!-- Persistence Vector Silhouette -->
<div class="absolute inset-0 flex items-center justify-center opacity-20 pointer-events-none">
<span class="material-symbols-outlined text-[120px] text-on-surface" style="font-variation-settings: 'FILL' 0;">inventory_2</span>
</div>
<div class="z-10 text-center w-full px-gutter flex flex-col items-center gap-4">
<div class="font-mono text-label-sm text-outline tracking-widest bg-surface-container-highest px-3 py-1 rounded-full border border-surface-variant">
                    [NETWORK_INSTABILITY_DETECTED]
                </div>
<div class="font-headline-lg text-headline-lg text-on-surface mt-4 opacity-70">
                    Buffering...
                </div>
</div>
</section>
<!-- Bottom 40% Sentinel Zone -->
<section class="flex-[0.4] flex flex-col items-center justify-end w-full pb-section-gap relative">
<!-- Desaturated Aura Wave -->
<div class="w-full flex justify-center items-center relative mb-8">
<div class="aura-wave-desaturated relative flex justify-center items-end">
<!-- Nexus Core - Dimmed/Pulsing slowly -->
<div class="w-4 h-4 bg-outline-variant rounded-full absolute -bottom-2 opacity-50"></div>
</div>
</div>
<!-- Monospaced Status Updates -->
<div class="font-mono text-[10px] text-primary-fixed-dim flex flex-col gap-2 opacity-60 w-full px-gutter text-center">
<p>[CONNECTING...]</p>
<p>[LOCAL_BUFFER_ACTIVE]</p>
<p class="text-outline">Syncing queue 3/4...</p>
</div>
</section>
</main>
<!-- Bottom Nav Bar (From Shared Components) -->
<nav class="fixed bottom-0 left-0 right-0 flex justify-around items-center h-20 max-w-[300px] mx-auto bg-surface-container-lowest dark:bg-surface-container-lowest border-t-8 border-surface-variant dark:border-surface-variant z-50">
<!-- Assuming Queue is active based on context -->
<button aria-label="Queue" class="flex flex-col items-center justify-center bg-primary-container dark:bg-primary-container text-on-primary-container dark:text-on-primary-container rounded-lg px-3 py-1 opacity-80 scale-98 transition-all w-16">
<span class="material-symbols-outlined text-[24px] mb-1" style="font-variation-settings: 'FILL' 1;">assignment</span>
<span class="font-label-sm text-label-sm uppercase tracking-widest text-[8px]">Queue</span>
</button>
<button aria-label="Inventory" class="flex flex-col items-center justify-center text-on-surface-variant dark:text-on-surface-variant px-3 py-1 hover:bg-surface-variant dark:hover:bg-surface-variant rounded-lg transition-colors w-16">
<span class="material-symbols-outlined text-[24px] mb-1">inventory_2</span>
<span class="font-label-sm text-label-sm uppercase tracking-widest text-[8px]">Inventory</span>
</button>
<button aria-label="Dispatch" class="flex flex-col items-center justify-center text-on-surface-variant dark:text-on-surface-variant px-3 py-1 hover:bg-surface-variant dark:hover:bg-surface-variant rounded-lg transition-colors w-16">
<span class="material-symbols-outlined text-[24px] mb-1">local_shipping</span>
<span class="font-label-sm text-label-sm uppercase tracking-widest text-[8px]">Dispatch</span>
</button>
</nav>
</body></html>
