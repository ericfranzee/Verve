<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Active Order Picking - Logistics Hub</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&amp;family=JetBrains+Mono:wght@400;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "text-primary": "#FFFFFF",
                        "surface-dim": "#101414",
                        "primary-fixed-dim": "#76d6d5",
                        "aura-teal": "#008080",
                        "surface-container-high": "#262b2b",
                        "surface": "#101414",
                        "inverse-on-surface": "#2c3131",
                        "on-tertiary-fixed-variant": "#733512",
                        "on-background": "#dfe3e2",
                        "surface-variant": "#313635",
                        "inverse-primary": "#006a6a",
                        "surface-tint": "#76d6d5",
                        "surface-container-low": "#181c1c",
                        "inverse-surface": "#dfe3e2",
                        "secondary-container": "#25a55a",
                        "secondary": "#66dd8b",
                        "tertiary-fixed-dim": "#ffb692",
                        "tertiary-fixed": "#ffdbcb",
                        "on-primary": "#003737",
                        "on-secondary-fixed": "#00210c",
                        "on-tertiary-container": "#fff9f7",
                        "tertiary-container": "#a96039",
                        "error-container": "#93000a",
                        "tertiary": "#ffb692",
                        "surface-container-highest": "#313635",
                        "on-primary-container": "#e3fffe",
                        "surface-container": "#1c2020",
                        "secondary-fixed": "#83fba5",
                        "outline-variant": "#3e4949",
                        "on-secondary": "#003919",
                        "vital-emerald": "#50C878",
                        "on-tertiary-fixed": "#341100",
                        "on-primary-fixed": "#002020",
                        "primary-fixed": "#93f2f2",
                        "on-error-container": "#ffdad6",
                        "outline": "#879392",
                        "error": "#ffb4ab",
                        "surface-container-lowest": "#0a0f0f",
                        "on-secondary-container": "#003115",
                        "primary": "#76d6d5",
                        "on-tertiary": "#552000",
                        "on-primary-fixed-variant": "#004f4f",
                        "on-surface": "#dfe3e2",
                        "surface-bright": "#353a3a",
                        "on-surface-variant": "#bdc9c8",
                        "on-error": "#690005",
                        "on-secondary-fixed-variant": "#005227",
                        "primary-container": "#008080",
                        "secondary-fixed-dim": "#66dd8b",
                        "background": "#000000",
                        "nexus-amber": "#FFBF00"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "gutter": "1rem",
                        "section-gap": "3rem",
                        "container-max": "300px",
                        "title-margin-top": "2rem",
                        "tagline-margin-top": "0.5rem"
                    },
                    "fontFamily": {
                        "body-md": ["Inter"],
                        "brand-tagline": ["Inter"],
                        "label-sm": ["Inter"],
                        "headline-lg": ["Inter"],
                        "brand-title": ["Inter"],
                        "mono": ["JetBrains Mono", "monospace"]
                    },
                    "fontSize": {
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],

                        "label-sm": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05rem", "fontWeight": "500" }],
                        "headline-lg": ["24px", { "lineHeight": "32px", "fontWeight": "300" }],
                        "brand-title": ["32px", { "lineHeight": "1.2", "letterSpacing": "0.5rem", "fontWeight": "300" }]

<style>
        body { font-family: 'Inter', sans-serif; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col items-center pb-24">
<!-- TopAppBar -->
<header class="bg-surface border-b-4 border-surface-variant flex justify-between items-center w-full px-gutter h-16 max-w-[300px] mx-auto fixed top-0 z-50">
<button class="text-on-surface-variant hover:text-primary-fixed-dim transition-colors flex items-center justify-center p-2">
<span class="material-symbols-outlined">menu</span>
</button>
<h1 class="font-brand-title text-brand-title text-primary tracking-[0.5rem] uppercase">LOGISTICS_HUB</h1>
<button class="text-on-surface-variant hover:text-primary-fixed-dim transition-colors flex items-center justify-center p-2">
<span class="material-symbols-outlined">account_circle</span>
</button>
</header>
<!-- Main Canvas -->
<main class="w-full max-w-[300px] mt-24 px-gutter flex-1 flex flex-col gap-section-gap">
<!-- Order Header & Progress -->
<section class="flex flex-col gap-4">
<div class="flex justify-between items-end">
<div>
<p class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-widest mb-1">Active Order</p>
<h2 class="font-mono text-xl font-bold text-primary">ORD-8821A</h2>
</div>
<div class="text-right">
<p class="font-mono text-sm text-surface-tint">4/12 ITEMS</p>
</div>
</div>
<!-- Progress Bar -->
<div class="w-full h-2 bg-surface-variant rounded-full overflow-hidden">
<div class="h-full bg-aura-teal w-[33%] rounded-full shadow-[0_0_8px_rgba(0,128,128,0.5)]"></div>
</div>
</section>
<!-- Scanner Viewfinder -->
<section class="relative w-full aspect-square border-8 border-aura-teal rounded-DEFAULT overflow-hidden bg-surface flex items-center justify-center shadow-[0_0_15px_rgba(0,128,128,0.2)]">
<div class="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1580674684081-776732890696?ixlib=rb-4.0.3&amp;auto=format&amp;fit=crop&amp;w=800&amp;q=80')] bg-cover bg-center opacity-30" data-alt="A close-up, dimly lit view through a barcode scanner viewfinder looking at a warehouse shelf holding organic produce. The scene is rendered in a high-contrast dark mode aesthetic with deep blacks and subtle highlights. An overlaid faint teal targeting reticle sits in the center. The mood is highly technical, focused, and industrial, perfectly aligning with a premium logistics interface.">
</div>
<!-- Reticle -->
<div class="relative z-10 w-32 h-32 border-2 border-dashed border-primary opacity-50 flex items-center justify-center">
<div class="w-full h-0.5 bg-primary absolute top-1/2 -translate-y-1/2 shadow-[0_0_5px_rgba(118,214,213,0.8)]"></div>
</div>
<p class="absolute bottom-4 left-0 right-0 text-center font-mono text-xs text-primary bg-surface/80 py-1">SCAN ITEM BARCODE</p>
</section>
<!-- Pick List -->
<section class="flex flex-col gap-4">
<h3 class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-widest border-b border-surface-variant pb-2">Remaining Items</h3>
<!-- Item 1: High PoF -->
<div class="p-4 bg-surface-container-low rounded-lg border border-transparent">
<div class="flex justify-between items-start mb-2">
<h4 class="font-body-md text-body-md text-text-primary">Atlantic Salmon</h4>
<span class="font-mono text-xs text-vital-emerald border border-vital-emerald/30 px-2 py-0.5 rounded-full">PoF: 0.98</span>
</div>
<p class="font-label-sm text-label-sm text-on-surface-variant mb-4">Aisle 4, Bin 12A - Chilled</p>
</div>
<!-- Item 2: Low PoF / Issue -->
<div class="p-4 bg-surface-container-high rounded-lg border-l-4 border-nexus-amber relative overflow-hidden">
<div class="absolute top-0 right-0 w-16 h-16 bg-nexus-amber/10 rounded-bl-full"></div>
<div class="flex justify-between items-start mb-2 relative z-10">
<h4 class="font-body-md text-body-md text-text-primary">Organic Spinach</h4>
<span class="font-mono text-xs text-[#FFBF00] border border-[#FFBF00]/30 px-2 py-0.5 rounded-full">PoF: 0.42</span>
</div>
<p class="font-label-sm text-label-sm text-error mb-4 relative z-10">Aisle 2, Bin 04B - Low Stock Warning</p>
<button class="w-full py-3 bg-[#FFBF00]/10 border border-[#FFBF00] text-[#FFBF00] font-label-sm text-label-sm uppercase tracking-widest rounded-full hover:bg-[#FFBF00]/20 transition-colors flex items-center justify-center gap-2 relative z-10">
<span class="material-symbols-outlined text-[18px]" style="font-variation-settings: 'FILL' 1;">warning</span>
                    TRIGGER HUMAN BRIDGE
                </button>
</div>
<!-- Item 3: Normal -->
<div class="p-4 bg-surface-container-low rounded-lg border border-transparent opacity-60">
<div class="flex justify-between items-start mb-2">
<h4 class="font-body-md text-body-md text-text-primary">Almond Milk</h4>
<span class="font-mono text-xs text-vital-emerald border border-vital-emerald/30 px-2 py-0.5 rounded-full">PoF: 0.95</span>
</div>
<p class="font-label-sm text-label-sm text-on-surface-variant">Aisle 7, Bin 22C - Ambient</p>
</div>
</section>
</main>
<!-- BottomNavBar -->
<!-- Not rendering bottom nav based on "Task-Focused: Any sub-page featuring a "Close" or "Back" action that implies a temporary departure from the main navigation flow." 
         This is an active picking interface for a single order, implicitly a focused task view, not a top-level destination. -->
</body></html>
