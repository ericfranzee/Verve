<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Logistics Hub - Dispatch</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "text-primary": "#FFFFFF",
                    "surface-dim": "#101414",
                    "primary-fixed-dim": "#76d6d5",
                    "aura-teal": "#008080",
                    "surface-container-high": "#262b2b",
                    "surface": "#101414",
                    "inverse-on-surface": "#2c3131",
                    "on-tertiary-fixed-variant": "#733512",
                    "on-background": "#dfe3e2",
                    "surface-variant": "#313635",
                    "inverse-primary": "#006a6a",
                    "surface-tint": "#76d6d5",
                    "surface-container-low": "#181c1c",
                    "inverse-surface": "#dfe3e2",
                    "secondary-container": "#25a55a",
                    "secondary": "#66dd8b",
                    "tertiary-fixed-dim": "#ffb692",
                    "tertiary-fixed": "#ffdbcb",
                    "on-primary": "#003737",
                    "on-secondary-fixed": "#00210c",
                    "on-tertiary-container": "#fff9f7",
                    "tertiary-container": "#a96039",
                    "error-container": "#93000a",
                    "tertiary": "#ffb692",
                    "surface-container-highest": "#313635",
                    "on-primary-container": "#e3fffe",
                    "surface-container": "#1c2020",
                    "secondary-fixed": "#83fba5",
                    "outline-variant": "#3e4949",
                    "on-secondary": "#003919",
                    "vital-emerald": "#50C878",
                    "on-tertiary-fixed": "#341100",
                    "on-primary-fixed": "#002020",
                    "primary-fixed": "#93f2f2",
                    "on-error-container": "#ffdad6",
                    "outline": "#879392",
                    "error": "#ffb4ab",
                    "surface-container-lowest": "#0a0f0f",
                    "on-secondary-container": "#003115",
                    "primary": "#76d6d5",
                    "on-tertiary": "#552000",
                    "on-primary-fixed-variant": "#004f4f",
                    "on-surface": "#dfe3e2",
                    "surface-bright": "#353a3a",
                    "on-surface-variant": "#bdc9c8",
                    "on-error": "#690005",
                    "on-secondary-fixed-variant": "#005227",
                    "primary-container": "#008080",
                    "secondary-fixed-dim": "#66dd8b",
                    "background": "#000000"
            },
            "borderRadius": {
                    "DEFAULT": "1rem",
                    "lg": "2rem",
                    "xl": "3rem",
                    "full": "9999px"
            },
            "spacing": {
                    "gutter": "1rem",
                    "section-gap": "3rem",
                    "container-max": "300px",
                    "title-margin-top": "2rem",
                    "tagline-margin-top": "0.5rem"
            },
            "fontFamily": {
                    "body-md": ["Inter"],
                    "brand-tagline": ["Inter"],
                    "label-sm": ["Inter"],
                    "headline-lg": ["Inter"],
                    "brand-title": ["Inter"]
            },
            "fontSize": {
                    "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "brand-tagline": ["12.8px", {"lineHeight": "1.5", "letterSpacing": "0.2rem", "fontWeight": "400"}],
                    "label-sm": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05rem", "fontWeight": "500"}],
                    "headline-lg": ["24px", {"lineHeight": "32px", "fontWeight": "300"}],
                    "brand-title": ["32px", {"lineHeight": "1.2", "letterSpacing": "0.5rem", "fontWeight": "300"}]
            }
          }
        }
      }
    </script>
<style>
        body {
            background-color: #000000;
            color: #dfe3e2;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 0;
        }
        
        .material-symbols-outlined {
          font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        /* Monospace override for utility feel */
        .utility-mono {
            font-family: 'Courier New', Courier, monospace;
            letter-spacing: 0.1em;
        }
        
        /* The Pulse / Aura Graphic */
        .pulse-graphic {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            border: 8px solid #008080; /* aura-teal */
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        
        /* Electric Blue State (Simulating the requirement) */
        .pulse-graphic.electric-blue {
            border-color: #76d6d5; /* primary */
            box-shadow: 0 0 40px rgba(118, 214, 213, 0.4);
        }
        
        .pulse-core {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: #50C878; /* vital-emerald */
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-md text-body-md pb-24">
<!-- Main Container matching max-w-[300px] requirement -->
<div class="w-full max-w-container-max flex flex-col min-h-screen relative">
<!-- TopAppBar -->
<header class="flex justify-between items-center w-full px-gutter h-16 max-w-[300px] mx-auto bg-surface border-b-4 border-surface-variant sticky top-0 z-40">
<div class="flex items-center text-primary">
<span class="material-symbols-outlined hover:text-primary-fixed-dim transition-colors cursor-pointer" data-icon="menu">menu</span>
</div>
<h1 class="font-brand-title text-brand-title text-primary tracking-[0.5rem] uppercase">LOGISTICS_HUB</h1>
<div class="flex items-center text-primary">
<span class="material-symbols-outlined hover:text-primary-fixed-dim transition-colors cursor-pointer" data-icon="account_circle">account_circle</span>
</div>
</header>
<!-- Main Content Area -->
<main class="flex-grow flex flex-col items-center px-gutter pt-8 pb-12">
<!-- Context Header -->
<div class="w-full text-center mb-8">
<p class="font-brand-tagline text-brand-tagline text-on-surface-variant uppercase mb-2">Active Protocol</p>
<h2 class="font-headline-lg text-headline-lg text-primary utility-mono">BIO-HANDSHAKE</h2>
</div>
<!-- Pulse Graphic Area -->
<div class="flex justify-center items-center my-12 relative w-full">
<!-- Using Electric Blue state to simulate the 50m geofence active state -->
<div class="pulse-graphic electric-blue">
<div class="pulse-core"></div>
</div>
<!-- Status Overlay (simulated radar/ping lines) -->
<div class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none">
<span class="material-symbols-outlined text-surface-tint opacity-50" data-icon="wifi_tethering" style="font-size: 80px;">wifi_tethering</span>
</div>
</div>
<!-- Monospaced Data Output -->
<div class="w-full flex flex-col gap-4 mt-8 utility-mono text-sm border-t border-surface-variant pt-6">
<div class="flex justify-between items-center border-b border-surface-container pb-2">
<span class="text-on-surface-variant">TARGET:</span>
<span class="text-text-primary">RIDER: KOFI - LEKKI 04</span>
</div>
<div class="flex justify-between items-center border-b border-surface-container pb-2">
<span class="text-on-surface-variant">DISTANCE:</span>
<span class="text-primary">&lt; 50m (GEOFENCE_IN)</span>
</div>
<div class="flex justify-between items-center border-b border-surface-container pb-2">
<span class="text-on-surface-variant">BLE TOKEN:</span>
<span class="text-tertiary-fixed-dim animate-pulse">[EXCHANGING...]</span>
</div>
<div class="flex justify-between items-center pt-2">
<span class="text-on-surface-variant">SYSTEM:</span>
<!-- Demonstrating the vital-emerald completion state as requested, even though it says exchanging above, UI usually shows pending then complete. Showing the final state class usage here. -->
<span class="text-vital-emerald font-bold">[HANDOVER COMPLETE]</span>
</div>
</div>
<!-- Manual Override Action (Hidden structurally, visible for demo) -->
<div class="mt-12 w-full flex justify-center">
<button class="px-6 py-3 rounded-full border border-surface-variant text-on-surface-variant font-label-sm text-label-sm uppercase tracking-widest hover:border-outline hover:text-text-primary transition-colors">
                     Force Override
                 </button>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 right-0 flex justify-around items-center h-20 max-w-[300px] mx-auto bg-surface-container-lowest border-t-8 border-surface-variant z-50">
<!-- Queue (Inactive) -->
<div class="flex flex-col items-center justify-center text-on-surface-variant px-3 py-1 hover:bg-surface-variant cursor-pointer">
<span class="material-symbols-outlined mb-1" data-icon="assignment">assignment</span>
<span class="font-label-sm text-label-sm uppercase tracking-widest text-[10px]">Queue</span>
</div>
<!-- Inventory (Inactive) -->
<div class="flex flex-col items-center justify-center text-on-surface-variant px-3 py-1 hover:bg-surface-variant cursor-pointer">
<span class="material-symbols-outlined mb-1" data-icon="inventory_2">inventory_2</span>
<span class="font-label-sm text-label-sm uppercase tracking-widest text-[10px]">Inventory</span>
</div>
<!-- Dispatch (Active) -->
<div class="flex flex-col items-center justify-center bg-primary-container text-on-primary-container rounded-lg px-3 py-1 opacity-80 scale-95 transition-all cursor-pointer">
<span class="material-symbols-outlined mb-1" data-icon="local_shipping" style="font-variation-settings: 'FILL' 1;">local_shipping</span>
<span class="font-label-sm text-label-sm uppercase tracking-widest text-[10px]">Dispatch</span>
</div>
</nav>
</div>
</body></html>
