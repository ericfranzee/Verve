<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>VERVE - GIS Canvas</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&amp;family=JetBrains+Mono:wght@400&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container-lowest": "#0a0f0f",
                        "surface-container-low": "#181c1c",
                        "surface-dim": "#101414",
                        "on-error-container": "#ffdad6",
                        "outline": "#879392",
                        "surface-tint": "#76d6d5",
                        "inverse-on-surface": "#2c3131",
                        "error": "#ffb4ab",
                        "on-secondary-fixed": "#00210c",
                        "primary-fixed-dim": "#76d6d5",
                        "on-primary-fixed": "#002020",
                        "error-container": "#93000a",
                        "on-primary-container": "#e3fffe",
                        "on-surface-variant": "#bdc9c8",
                        "outline-variant": "#3e4949",
                        "background": "#000000",
                        "tertiary": "#ffb692",
                        "tertiary-container": "#a96039",
                        "on-tertiary-container": "#fff9f7",
                        "secondary": "#66dd8b",
                        "inverse-primary": "#006a6a",
                        "on-surface": "#dfe3e2",
                        "primary-container": "#008080",
                        "surface-container-highest": "#313635",
                        "primary-fixed": "#93f2f2",
                        "on-tertiary": "#552000",
                        "on-secondary-container": "#003115",
                        "on-background": "#dfe3e2",
                        "surface-container-high": "#262b2b",
                        "on-primary-fixed-variant": "#004f4f",
                        "on-tertiary-fixed-variant": "#733512",
                        "on-secondary": "#003919",
                        "text-primary": "#FFFFFF",
                        "on-tertiary-fixed": "#341100",
                        "surface-bright": "#353a3a",
                        "on-secondary-fixed-variant": "#005227",
                        "tertiary-fixed-dim": "#ffb692",
                        "secondary-fixed": "#83fba5",
                        "tertiary-fixed": "#ffdbcb",
                        "aura-teal": "#008080",
                        "surface-container": "#1c2020",
                        "on-primary": "#003737",
                        "surface-variant": "#313635",
                        "secondary-fixed-dim": "#66dd8b",
                        "on-error": "#690005",
                        "inverse-surface": "#dfe3e2",
                        "vital-emerald": "#50C878",
                        "surface": "#101414",
                        "primary": "#76d6d5",
                        "secondary-container": "#25a55a"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "title-margin-top": "2rem",
                        "gutter": "1rem",
                        "section-gap": "3rem",
                        "container-max": "300px",
                        "tagline-margin-top": "0.5rem"
                    },
                    "fontFamily": {
                        "label-sm": ["Inter"],
                        "brand-title": ["Inter"],
                        "brand-tagline": ["Inter"],
                        "headline-lg": ["Inter"],
                        "body-md": ["Inter"],
                        "mono": ["JetBrains Mono"]
                    },
                    "fontSize": {
                        "label-sm": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05rem", "fontWeight": "500"}],
                        "brand-title": ["32px", {"lineHeight": "1.2", "letterSpacing": "0.5rem", "fontWeight": "300"}],
                        "brand-tagline": ["12.8px", {"lineHeight": "1.5", "letterSpacing": "0.2rem", "fontWeight": "400"}],
                        "headline-lg": ["24px", {"lineHeight": "32px", "fontWeight": "300"}],
                        "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        .gis-gradient-overlay {
            background: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.8) 100%);
        }
        .frosted-glass {
            background: rgba(18, 18, 18, 0.7);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-md selection:bg-aura-teal/30 overflow-hidden">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 flex justify-center items-center h-16 px-gutter bg-background transition-opacity duration-500">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-primary" data-icon="bubble_chart">bubble_chart</span>
<h1 class="font-brand-title text-brand-title text-primary tracking-[0.5rem]">VERVE</h1>
</div>
</header>
<!-- GIS Canvas Main Stage -->
<main class="relative w-full h-screen">
<!-- Mock GIS Map Layer -->
<div class="absolute inset-0 z-0">
<img class="w-full h-full object-cover opacity-40 grayscale" data-alt="A dark, high-contrast satellite view of a metropolitan city at night, processed with a deep blue and black color grade. The city streets form a complex web of architectural patterns, with glowing cyan and teal light trails representing movement. Subtle amber and crimson heat clouds are overlaid on specific intersections to signify traffic density in a premium, data-driven aesthetic." data-location="Lagos" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBvhUDwYnAEKZSeHqoNkIdCOVpJHb5Ev_eEfYRPxYk13qcK8BZ7uyTSoGVNzsxWRxPdsf9XgrPCbYWEBQ47oHGsr1vjCLcUcwzfXaxC4k62Z3X2XDaROEBAhcB7-QSTAzfNSBRKI2a_ltXFMvbzB7hMR4MtiGrQsZWKKfT3qgvZNzRNHr3VBeRt8cV-WPjZZwmBCtF4dykUtybDLxeqJyXgjhgzXoUpnYtSSRwtDyMQuHNVa_SnpWSdDoCDsSpLoUAebLBe0puld-Vu"/>
<div class="absolute inset-0 gis-gradient-overlay"></div>
<!-- SVG Map Overlays (Route, Hub, Rider) -->
<svg class="absolute inset-0 w-full h-full pointer-events-none" viewbox="0 0 1000 1000">
<!-- Traffic Heatmap Zones (Subtle) -->
<circle cx="600" cy="400" fill="rgba(255, 191, 0, 0.15)" filter="blur(40px)" r="80"></circle>
<circle cx="580" cy="420" fill="rgba(255, 0, 0, 0.1)" filter="blur(30px)" r="50"></circle>
<!-- The Route -->
<path d="M 500 800 Q 550 600, 450 400 T 600 300" fill="none" stroke="#008080" stroke-dasharray="10 10" stroke-linecap="round" stroke-width="3"></path>
<!-- The Hub (Start) -->
<g transform="translate(500, 800)">
<circle class="animate-pulse" fill="#50C878" r="12"></circle>
<circle fill="none" opacity="0.5" r="20" stroke="#50C878" stroke-width="1">
<animate attributename="r" dur="2s" from="12" repeatcount="indefinite" to="40"></animate>
<animate attributename="opacity" dur="2s" from="0.5" repeatcount="indefinite" to="0"></animate>
</circle>
</g>
<!-- The Rider (Moving Chevron) -->
<g transform="translate(600, 300) rotate(-45)">
<path d="M -10 10 L 0 -15 L 10 10" fill="none" stroke="#FFFFFF" stroke-linecap="round" stroke-linejoin="round" stroke-width="4"></path>
<path d="M -10 10 L 0 -15 L 10 10" fill="none" stroke="#76d6d5" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</g>
</svg>
</div>
<!-- Overlay: Frosted Receipt (State 5) -->
<section class="fixed bottom-32 left-1/2 -translate-x-1/2 w-full max-w-[300px] z-40">
<div class="frosted-glass rounded-lg p-6 flex flex-col gap-4 shadow-2xl">
<div class="flex justify-between items-start border-b border-white/5 pb-4">
<div>
<p class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-widest">Tracking ID</p>
<p class="font-mono text-xs text-primary mt-1">#VRV-992-LX</p>
</div>
<div class="text-right">
<p class="font-label-sm text-label-sm text-vital-emerald uppercase tracking-widest">In Transit</p>
<p class="font-mono text-xs text-white/60 mt-1">ETA 12 MIN</p>
</div>
</div>
<div class="space-y-2 py-2">
<div class="flex justify-between">
<span class="font-label-sm text-on-surface-variant">Fulfillment Fee</span>
<span class="font-mono text-white">₦ 2,400.00</span>
</div>
<div class="flex justify-between">
<span class="font-label-sm text-on-surface-variant">VAT (7.5%)</span>
<span class="font-mono text-white">₦ 180.00</span>
</div>
<div class="pt-2 flex justify-between border-t border-white/5">
<span class="font-label-sm text-white font-bold uppercase">Total Charged</span>
<span class="font-mono text-vital-emerald font-bold">₦ 2,580.00</span>
</div>
</div>
<div class="bg-white/5 rounded-md p-3 flex items-center gap-3">
<span class="material-symbols-outlined text-aura-teal text-sm" data-icon="lock" data-weight="fill" style="font-variation-settings: 'FILL' 1;">lock</span>
<p class="font-mono text-[10px] text-on-surface-variant leading-tight">
                        Paid via Paystack Token<br/>
<span class="opacity-50">AUTH_7721_XXXX</span>
</p>
</div>
</div>
<!-- Perspective Indicator / Pause Pause -->
<div class="mt-6 flex flex-col items-center gap-2">
<div class="w-12 h-1 bg-aura-teal/20 rounded-full overflow-hidden">
<div class="h-full bg-vital-emerald w-2/3"></div>
</div>
<p class="font-label-sm text-[10px] text-on-surface-variant uppercase tracking-widest opacity-60">Syncing Logistics...</p>
</div>
</section>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full z-50 flex justify-around items-center px-gutter pb-8 h-24 max-w-[300px] mx-auto left-0 right-0 bg-background/80 backdrop-blur-md rounded-t-xl">
<div class="flex flex-col items-center justify-center text-on-surface-variant opacity-40 hover:text-aura-teal transition-all duration-300">
<span class="material-symbols-outlined" data-icon="shield">shield</span>
</div>
<!-- ACTIVE: Pulse/Timeline for fulfillment tracking -->
<div class="flex flex-col items-center justify-center text-vital-emerald scale-110">
<span class="material-symbols-outlined" data-icon="timeline">timeline</span>
</div>
<div class="flex flex-col items-center justify-center text-on-surface-variant opacity-40 hover:text-aura-teal transition-all duration-300">
<span class="material-symbols-outlined" data-icon="graphic_eq">graphic_eq</span>
</div>
</nav>
<!-- The Pulse / Nexus Anchor (Floating Action Context) -->
<div class="fixed bottom-28 left-1/2 -translate-x-1/2 z-50 md:hidden">
<div class="relative w-16 h-16 flex items-center justify-center">
<div class="absolute inset-0 bg-vital-emerald/10 rounded-full animate-ping"></div>
<div class="relative w-10 h-10 bg-vital-emerald rounded-full flex items-center justify-center shadow-[0_0_20px_rgba(80,200,120,0.4)]">
<span class="material-symbols-outlined text-black" data-icon="hub">hub</span>
</div>
</div>
</div>
</body></html>
