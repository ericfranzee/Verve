            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .pulse-wave {
            stroke-dasharray: 1000;
            stroke-dashoffset: 0;
        }
        .tonal-surface {
            background-color: #121212;
        }
        .perspective-container {
            perspective: 1000px;
        }

    body {
      min-height: max(884px, 100dvh);

<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col overflow-hidden">

<h1 class="font-brand-title text-brand-title text-primary tracking-[0.5rem]">VERVE</h1>
</div>
</header>

<main class="flex-grow flex flex-col items-center pt-24 px-4 overflow-hidden">
<div class="w-full max-w-[300px] flex flex-col items-center flex-grow">

<div class="relative w-full h-[400px] perspective-container mt-8 flex justify-center items-center">

<div class="absolute inset-0 bg-gradient-to-t from-black/80 to-transparent"></div>
</div>

<img alt="Avocado" class="w-full h-full object-cover" data-alt="A sliced ripe avocado showcasing its smooth, creamy green flesh and dark pit. The fruit is presented in a minimalist, architectural style against a true black background. Soft, atmospheric dimming creates a sense of depth, while the vibrant green of the avocado acts as a natural splash of color in the boutique minimalist setting." src="https://lh3.googleusercontent.com/aida-public/AB6AXuA7Oj4kCrkVL5RRnzgMAdqFr5w7UeNSFtw_EhGl_HViBLO-OwX8HHX5OeO-nXy7usUcfZ7YCZw61YLVeN196PbFI5kkDjSBGPy4xn9B8kMB7AonvOVbTlIEpi_43OKJ0hsNnmPwCn9DS19V7By2fNmQVaH9zVaoCVNDBR3xPbpJq-mFNxsWDLtM4SV3AUlBtBG1qKvBUQ5tSSakHJCwLdW4sR6WZ61U4xmHmBkeyTcTwAjKFA9emeLi3arsFdBtndxgirbIpKwW9XeU"/>
<div class="absolute inset-0 bg-gradient-to-t from-black/80 to-transparent"></div>
</div>
<!-- Card 1 (Front Active) - Organic Spinach -->
<div class="absolute w-[280px] h-[360px] rounded-lg overflow-hidden transform translate-y-0 z-30 shadow-2xl border-[0.5px] border-white/20">
<img alt="Organic Spinach" class="w-full h-full object-cover" data-alt="Crisp, fresh organic spinach leaves captured with high-resolution detail. The leaves are vibrant green and slightly dewy, set against an absolute black void. The lighting is sophisticated and focused, highlighting the organic veins of the leaves. The overall mood is serene and life-affirming, aligning with a premium health and vitality brand identity." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDLfmw5NcoqtA32kDFiqliqLDlqWyva6Hk-K3OX1wSQMcunanL4KnffzheSGbFEUjanQbB9Tflk8r5YDmerAeVmN9U1dxQSfIIg1iZmTIW2wHkAya6ss8fMRsHyE711Oi-KgHbfziUc0h3p1eJ1ZBpTtFLt2T2UTXMW-3pCxUq2Z3al-6DacgpDHzy-xqyMVaBBB8AX1UruLzSbweVa4jXPpnfQv8jUk-180AuJcZEOnoJMX1leyK8aS9QYM0apy0t7X0AW426A85Xl"/>
<!-- Overlays -->
<div class="absolute inset-0 bg-gradient-to-b from-black/40 via-transparent to-black/90 p-6 flex flex-col justify-between">
<div class="flex justify-between items-start">
<div class="bg-black/60 backdrop-blur-md px-3 py-1 rounded-full border border-white/10">
<span class="font-body-md text-white font-bold tracking-wider">₦2,800</span>
</div>
<span class="material-symbols-outlined text-aura-teal" data-icon="shield">shield</span>
</div>
<div class="flex flex-col gap-2 items-end">
<div class="bg-vital-emerald px-4 py-1.5 rounded-full flex items-center gap-1.5">
<span class="w-2 h-2 rounded-full bg-white animate-pulse"></span>
<span class="font-label-sm text-black font-bold uppercase tracking-tighter">+Iron &amp; Fiber</span>
</div>
<h2 class="text-white font-headline-lg font-light tracking-widest mt-2">ORGANIC SPINACH</h2>
</div>
</div>
</div>
</div>
<!-- Bundle Title -->
<div class="mt-8 text-center">
<span class="font-label-sm text-on-surface-variant uppercase tracking-[0.3rem]">Active Suggestion</span>
<p class="font-headline-lg text-primary mt-1">Keto Dinner Bundle</p>
</div>
</div>
</main>
<!-- Sentinel Zone -->
<section class="w-full max-w-[300px] mx-auto pb-32 pt-4 px-4 flex flex-col items-center">

<div class="w-full flex justify-center mb-8 h-12 relative">
<svg class="w-full h-full overflow-visible" viewbox="0 0 300 40">
<path class="pulse-wave" d="M0 20 Q 75 40, 150 20 T 300 20" fill="none" stroke="#008080" stroke-linecap="round" stroke-width="8"></path>
<circle class="nexus-core shadow-[0_0_15px_rgba(80,200,120,0.8)]" cx="150" cy="20" fill="#50C878" r="8"></circle>
</svg>
</div>
<!-- AI Caption & Tooltip -->
<div class="relative w-full flex flex-col items-center">
<p class="font-body-md text-on-surface text-center leading-relaxed italic opacity-90">
                "I've assembled a 15-minute Keto dinner. Suggested the Spinach because you mentioned wanting more greens on Monday."
            </p>
<!-- Guardian Shield Tooltip -->
<div class="mt-4 flex items-center gap-2 bg-surface-container-high px-4 py-3 rounded-xl border border-aura-teal/30">
<span class="material-symbols-outlined text-aura-teal text-[18px]" data-icon="shield" style="font-variation-settings: 'FILL' 1;">shield</span>
<span class="font-label-sm text-on-surface-variant tracking-normal">Suggested because you blocked carbs on Monday.</span>

</div>

<button class="flex flex-col items-center justify-center text-on-surface-variant opacity-40 hover:text-aura-teal transition-all duration-300">

</button>
<!-- Pulse Icon (Active) -->
<button class="flex flex-col items-center justify-center text-vital-emerald scale-110 active:scale-125 transition-transform duration-300 ease-out">

</button>
<!-- Timeline Icon -->
<button class="flex flex-col items-center justify-center text-on-surface-variant opacity-40 hover:text-aura-teal transition-all duration-300">
<span class="material-symbols-outlined text-[28px]" data-icon="timeline">timeline</span>
