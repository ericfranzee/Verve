<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>VERVE - GIS Canvas</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&amp;family=JetBrains+Mono&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-container-lowest": "#0a0f0f",
                    "surface-container-low": "#181c1c",
                    "surface-dim": "#101414",
                    "on-error-container": "#ffdad6",
                    "outline": "#879392",
                    "surface-tint": "#76d6d5",
                    "inverse-on-surface": "#2c3131",
                    "error": "#ffb4ab",
                    "on-secondary-fixed": "#00210c",
                    "primary-fixed-dim": "#76d6d5",
                    "on-primary-fixed": "#002020",
                    "error-container": "#93000a",
                    "on-primary-container": "#e3fffe",
                    "on-surface-variant": "#bdc9c8",
                    "outline-variant": "#3e4949",
                    "background": "#000000",
                    "tertiary": "#ffb692",
                    "tertiary-container": "#a96039",
                    "on-tertiary-container": "#fff9f7",
                    "secondary": "#66dd8b",
                    "inverse-primary": "#006a6a",
                    "on-surface": "#dfe3e2",
                    "primary-container": "#008080",
                    "surface-container-highest": "#313635",
                    "primary-fixed": "#93f2f2",
                    "on-tertiary": "#552000",
                    "on-secondary-container": "#003115",
                    "on-background": "#dfe3e2",
                    "surface-container-high": "#262b2b",
                    "on-primary-fixed-variant": "#004f4f",
                    "on-tertiary-fixed-variant": "#733512",
                    "on-secondary": "#003919",
                    "text-primary": "#FFFFFF",
                    "on-tertiary-fixed": "#341100",
                    "surface-bright": "#353a3a",
                    "on-secondary-fixed-variant": "#005227",
                    "tertiary-fixed-dim": "#ffb692",
                    "secondary-fixed": "#83fba5",
                    "tertiary-fixed": "#ffdbcb",
                    "aura-teal": "#008080",
                    "surface-container": "#1c2020",
                    "on-primary": "#003737",
                    "surface-variant": "#313635",
                    "secondary-fixed-dim": "#66dd8b",
                    "on-error": "#690005",
                    "inverse-surface": "#dfe3e2",
                    "vital-emerald": "#50C878",
                    "surface": "#101414",
                    "primary": "#76d6d5",
                    "secondary-container": "#25a55a"
            },
            "borderRadius": {
                    "DEFAULT": "1rem",
                    "lg": "2rem",
                    "xl": "3rem",
                    "full": "9999px"
            },
            "spacing": {
                    "title-margin-top": "2rem",
                    "gutter": "1rem",
                    "section-gap": "3rem",
                    "container-max": "300px",
                    "tagline-margin-top": "0.5rem"
            },
            "fontFamily": {
                    "label-sm": ["Inter"],
                    "brand-title": ["Inter"],
                    "brand-tagline": ["Inter"],
                    "headline-lg": ["Inter"],
                    "body-md": ["Inter"],
                    "mono": ["JetBrains Mono"]
            },
            "fontSize": {
                    "label-sm": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05rem", "fontWeight": "500"}],
                    "brand-title": ["32px", {"lineHeight": "1.2", "letterSpacing": "0.5rem", "fontWeight": "300"}],
                    "brand-tagline": ["12.8px", {"lineHeight": "1.5", "letterSpacing": "0.2rem", "fontWeight": "400"}],
                    "headline-lg": ["24px", {"lineHeight": "32px", "fontWeight": "300"}],
                    "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}]
            }
          },
        },
      }
    </script>
<style>
        body { background-color: #000000; color: #FFFFFF; overflow: hidden; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        .frosted-receipt {
            backdrop-filter: blur(20px);
            background: rgba(16, 20, 20, 0.7);
        }
        .map-container {
            mask-image: radial-gradient(circle at center, black 60%, transparent 100%);
        }
        /* Pulse Animation */
        @keyframes pulse-teal {
            0% { box-shadow: 0 0 0 0 rgba(0, 128, 128, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(0, 128, 128, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 128, 128, 0); }
        }
        .nexus-pulse {
            animation: pulse-teal 2s infinite;
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen">
<!-- Top App Bar (Shared Component) -->
<header class="fixed top-0 w-full flex justify-center items-center h-16 px-gutter z-50">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary" data-icon="bubble_chart">bubble_chart</span>
<h1 class="font-brand-title text-brand-title text-primary tracking-[0.5rem]">VERVE</h1>
</div>
</header>
<!-- Main GIS Canvas Container -->
<main class="relative w-full h-screen max-w-[500px] flex flex-col items-center justify-center overflow-hidden">
<!-- Background Vector Map (Mocked via Canvas/SVG Styling) -->
<div class="absolute inset-0 z-0 opacity-40">
<div class="w-full h-full bg-[url('https://images.unsplash.com/photo-1526778548025-fa2f459cd5c1?q=80&amp;w=2000&amp;auto=format&amp;fit=crop')] bg-cover bg-center grayscale brightness-[0.2] contrast-150 mix-blend-screen" data-alt="A highly detailed, dark-mode digital map interface with minimalist vector lines representing city streets. The aesthetic is monochromatic black and deep charcoal with glowing cyan highlights on specific transit routes. Subtle atmospheric haze and cinematic grain create a high-end, futuristic GIS tracking environment consistent with a premium logistics application.">
</div>
<!-- Custom Route Overlay (SVG) -->
<svg class="absolute inset-0 w-full h-full pointer-events-none" viewbox="0 0 400 800" xmlns="http://www.w3.org/2000/svg">
<!-- Traffic Heatmap Zones -->
<circle cx="180" cy="350" fill="#FFBF00" filter="blur(25px)" opacity="0.3" r="40"></circle>
<circle cx="220" cy="500" fill="#EF4444" filter="blur(20px)" opacity="0.4" r="30"></circle>
<!-- The Glowing Route Line -->
<path class="drop-shadow-[0_0_8px_rgba(0,128,128,0.8)]" d="M 200 450 L 210 400 L 190 320 L 220 280 L 180 200" fill="none" stroke="#008080" stroke-dasharray="1, 8" stroke-linecap="round" stroke-width="3"></path>
<!-- The Hub (Start) -->
<g transform="translate(200, 450)">
<circle class="nexus-pulse" fill="#50C878" r="8"></circle>
<circle fill="#FFFFFF" r="4"></circle>
</g>
<!-- The Rider (Geometric Chevron) -->
<g transform="translate(180, 200) rotate(-20)">
<path class="drop-shadow-[0_0_5px_rgba(255,255,255,0.5)]" d="M 0 -10 L 8 10 L 0 5 L -8 10 Z" fill="#FFFFFF"></path>
</g>
</svg>
</div>
<!-- Floating UI Overlays -->
<div class="absolute top-24 left-1/2 -translate-x-1/2 flex flex-col items-center text-center z-10 w-[300px]">
<span class="font-label-sm text-label-sm uppercase tracking-widest text-on-surface-variant mb-2">Transit Status</span>
<div class="flex items-center gap-2">
<span class="w-2 h-2 rounded-full bg-vital-emerald animate-pulse"></span>
<h2 class="font-headline-lg text-headline-lg text-white">4 mins to drop-off</h2>
</div>
</div>
<!-- Frosted Receipt Modal (State 5 Overlay) -->
<section class="absolute bottom-32 w-full max-w-[300px] z-20">
<div class="frosted-receipt rounded-lg p-6 border-t-8 border-aura-teal flex flex-col gap-4">
<!-- Receipt Header -->
<div class="flex justify-between items-start border-b border-white/10 pb-4">
<div>
<p class="font-label-sm text-label-sm text-on-surface-variant uppercase">Order ID</p>
<p class="font-mono text-xs text-white">#VRV-99281-X</p>
</div>
<span class="material-symbols-outlined text-aura-teal" data-icon="shield" style="font-variation-settings: 'FILL' 1;">shield</span>
</div>
<!-- Transaction Details -->
<div class="space-y-2 py-2">
<div class="flex justify-between font-mono text-xs">
<span class="text-on-surface-variant">Logistics Fee</span>
<span class="text-white">₦ 2,400.00</span>
</div>
<div class="flex justify-between font-mono text-xs">
<span class="text-on-surface-variant">VAT (7.5%)</span>
<span class="text-white">₦ 180.00</span>
</div>
<div class="flex justify-between font-mono text-sm pt-2 border-t border-white/5 font-bold">
<span class="text-white">Total</span>
<span class="text-vital-emerald">₦ 2,580.00</span>
</div>
</div>
<!-- Payment Status -->
<div class="bg-surface-container-high/50 p-3 rounded-md flex items-center justify-center gap-3">
<span class="material-symbols-outlined text-vital-emerald text-sm" data-icon="check_circle">check_circle</span>
<p class="font-mono text-[10px] uppercase tracking-wider text-vital-emerald">Paid via Paystack Token</p>
</div>
</div>
</section>
</main>
<!-- Bottom Navigation Shell (Shared Component) -->
<nav class="fixed bottom-0 w-full z-50 flex justify-around items-center px-gutter pb-8 h-24 max-w-[300px] mx-auto left-0 right-0">
<!-- Shield (Timeline/Active) -->
<div class="flex flex-col items-center justify-center text-on-surface-variant opacity-40 hover:text-aura-teal transition-all duration-300">
<span class="material-symbols-outlined text-2xl" data-icon="shield">shield</span>
</div>
<!-- Graphic EQ (Wave/Active Context) -->
<div class="flex flex-col items-center justify-center text-vital-emerald scale-110">
<div class="w-12 h-12 rounded-full border-[8px] border-aura-teal flex items-center justify-center bg-background p-1">
<span class="material-symbols-outlined text-xl" data-icon="graphic_eq">graphic_eq</span>
</div>
</div>
<!-- Timeline (Vault) -->
<div class="flex flex-col items-center justify-center text-on-surface-variant opacity-40 hover:text-aura-teal transition-all duration-300">
<span class="material-symbols-outlined text-2xl" data-icon="timeline">timeline</span>
</div>
</nav>
<!-- Content Safe Area Margin -->
<div class="h-24"></div>
</body></html>
