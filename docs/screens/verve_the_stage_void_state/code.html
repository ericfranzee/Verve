<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>VERVE - The Void</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        .waveform-container {
            filter: blur(1px);
        }
        /* Custom curve for the Aura Breathing Wave */
        .aura-wave {
            stroke-dasharray: 1000;
            stroke-dashoffset: 0;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "secondary-container": "#25a55a",
                      "surface-dim": "#101414",
                      "background": "#000000",
                      "primary-fixed": "#93f2f2",
                      "error": "#ffb4ab",
                      "on-primary-container": "#e3fffe",
                      "on-tertiary": "#552000",
                      "on-primary": "#003737",
                      "surface-container": "#1c2020",
                      "surface-variant": "#313635",
                      "surface": "#101414",
                      "on-secondary-fixed-variant": "#005227",
                      "tertiary": "#ffb692",
                      "on-tertiary-container": "#fff9f7",
                      "on-background": "#dfe3e2",
                      "on-error-container": "#ffdad6",
                      "on-primary-fixed-variant": "#004f4f",
                      "secondary-fixed": "#83fba5",
                      "primary-fixed-dim": "#76d6d5",
                      "outline-variant": "#3e4949",
                      "on-secondary": "#003919",
                      "surface-container-highest": "#313635",
                      "secondary-fixed-dim": "#66dd8b",
                      "inverse-on-surface": "#2c3131",
                      "on-tertiary-fixed": "#341100",
                      "inverse-surface": "#dfe3e2",
                      "primary-container": "#008080",
                      "on-secondary-container": "#003115",
                      "on-tertiary-fixed-variant": "#733512",
                      "tertiary-fixed-dim": "#ffb692",
                      "tertiary-container": "#a96039",
                      "inverse-primary": "#006a6a",
                      "on-error": "#690005",
                      "surface-container-lowest": "#0a0f0f",
                      "outline": "#879392",
                      "surface-container-high": "#262b2b",
                      "secondary": "#66dd8b",
                      "text-primary": "#FFFFFF",
                      "surface-bright": "#353a3a",
                      "surface-tint": "#76d6d5",
                      "on-secondary-fixed": "#00210c",
                      "surface-container-low": "#181c1c",
                      "primary": "#76d6d5",
                      "vital-emerald": "#50C878",
                      "on-surface": "#dfe3e2",
                      "tertiary-fixed": "#ffdbcb",
                      "on-surface-variant": "#bdc9c8",
                      "aura-teal": "#008080",
                      "on-primary-fixed": "#002020",
                      "error-container": "#93000a"
              },
              "borderRadius": {
                      "DEFAULT": "1rem",
                      "lg": "2rem",
                      "xl": "3rem",
                      "full": "9999px"
              },
              "spacing": {
                      "container-max": "300px",
                      "section-gap": "3rem",
                      "tagline-margin-top": "0.5rem",
                      "gutter": "1rem",
                      "title-margin-top": "2rem"
              },
              "fontFamily": {
                      "brand-tagline": ["Inter"],
                      "label-sm": ["Inter"],
                      "brand-title": ["Inter"],
                      "headline-lg": ["Inter"],
                      "body-md": ["Inter"]
              },
              "fontSize": {
                      "brand-tagline": ["12.8px", {"lineHeight": "1.5", "letterSpacing": "0.2rem", "fontWeight": "400"}],
                      "label-sm": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05rem", "fontWeight": "500"}],
                      "brand-title": ["32px", {"lineHeight": "1.2", "letterSpacing": "0.5rem", "fontWeight": "300"}],
                      "headline-lg": ["24px", {"lineHeight": "32px", "fontWeight": "300"}],
                      "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}]
              }
            },
          },
        }
      </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-md overflow-hidden antialiased">
<!-- TopAppBar Component (from JSON) -->
<header class="fixed top-0 w-full z-50 flex justify-center items-center h-16 px-gutter bg-background transition-opacity duration-500">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary" data-icon="bubble_chart">bubble_chart</span>
<h1 class="font-brand-title text-brand-title text-primary tracking-[0.5rem]">VERVE</h1>
</div>
</header>
<main class="relative h-screen w-full flex flex-col items-center">
<!-- Morphing Viewport (Top 60%) -->
<section class="w-full h-[60%] flex items-center justify-center bg-gradient-to-b from-background via-surface-container-lowest to-background">
<!-- Completely empty minimalist zone for cognitive relief -->
<div class="max-w-[300px] text-center opacity-20">
<p class="font-brand-tagline text-brand-tagline text-on-surface-variant italic">awaiting intent</p>
</div>
</section>
<!-- Sentinel Zone (Bottom 40%) -->
<section class="relative w-full h-[40%] flex flex-col items-center justify-start pt-12 overflow-hidden">
<!-- Aura Breathing Wave (The Pulse) -->
<div class="waveform-container w-full max-w-[400px] h-32 flex items-center justify-center relative mb-8">
<svg class="w-full h-full" viewbox="0 0 400 100">
<path class="aura-wave opacity-80" d="M0,50 Q100,20 200,50 T400,50" fill="none" stroke="#008080" stroke-linecap="round" stroke-width="8"></path>
<!-- The Nexus Core -->
<circle class="vital-emerald shadow-[0_0_20px_#50C878]" cx="200" cy="50" fill="#50C878" r="10"></circle>
</svg>
</div>
<!-- Interaction Prompt -->
<div class="mb-12">
<span class="font-label-sm text-label-sm uppercase tracking-[0.3rem] text-aura-teal animate-pulse">listening</span>
</div>
<!-- Text Fallback Trigger (Small keyboard icon) -->
<button class="mb-4 hover:opacity-80 transition-opacity">
<span class="material-symbols-outlined text-on-surface-variant text-sm" data-icon="keyboard">keyboard</span>
</button>
</section>
</main>
<!-- Bottom Navigation Shell (from JSON) -->
<nav class="fixed bottom-0 w-full z-50 flex justify-around items-center px-gutter pb-8 h-24 max-w-[300px] mx-auto left-0 right-0 bg-background/80 backdrop-blur-md rounded-t-xl">
<!-- Shield Icon (The Vault) -->
<button class="flex flex-col items-center justify-center text-on-surface-variant opacity-40 hover:text-aura-teal transition-all duration-300">
<span class="material-symbols-outlined" data-icon="shield">shield</span>
<span class="font-label-sm text-[8px] uppercase tracking-widest mt-1">Vault</span>
</button>
<!-- Active Tab (The Stage) - Semantic Mapping -->
<button class="flex flex-col items-center justify-center text-vital-emerald scale-110 active:scale-125 transition-transform duration-300 ease-out">
<span class="material-symbols-outlined" data-icon="graphic_eq" style="font-variation-settings: 'FILL' 1;">graphic_eq</span>
<span class="font-label-sm text-[8px] uppercase tracking-widest mt-1">Stage</span>
</button>
<!-- Timeline Icon (The Pulse) -->
<button class="flex flex-col items-center justify-center text-on-surface-variant opacity-40 hover:text-aura-teal transition-all duration-300">
<span class="material-symbols-outlined" data-icon="timeline">timeline</span>
<span class="font-label-sm text-[8px] uppercase tracking-widest mt-1">Pulse</span>
</button>
</nav>
<!-- Visual Background Enhancements -->
<div class="fixed inset-0 pointer-events-none z-0">
<!-- Subtle tonal gradient for depth in black -->
<div class="absolute inset-0 bg-radial-gradient from-surface-container-lowest via-transparent to-transparent opacity-30"></div>
</div>
</body></html>
