<!DOCTYPE html>

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #000000;
        }
        /* Custom Aura Wave Animation Simulation */
        .aura-pulse {
            stroke-dasharray: 1000;
            stroke-dashoffset: 0;
            opacity: 0.6;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-background text-on-background font-body-md text-body-md overflow-hidden min-h-screen flex flex-col items-center">
<!-- TopAppBar Shell -->
<header class="fixed top-0 w-full bg-background flex justify-center items-center h-16 px-gutter z-50">
<div class="flex items-center justify-between w-full max-w-[300px]">
<span class="material-symbols-outlined text-primary hover:opacity-80 transition-opacity duration-500 cursor-pointer">bubble_chart</span>
<h1 class="font-brand-title text-brand-title text-primary tracking-[0.5rem] select-none">VERVE</h1>
<div class="w-6"></div> <!-- Spacer for center alignment -->
</div>
</header>
<!-- Main Content: The Morphing Viewport & Sentinel Zone -->
<main class="flex-grow w-full flex flex-col items-center justify-end relative bg-gradient-to-b from-[#121212] via-black to-black">
<!-- Morphing Viewport (Top 60%) -->
<div class="absolute top-0 w-full h-[60%] pointer-events-none">
<!-- Completely empty as per prompt to reduce cognitive load -->
</div>
<!-- Sentinel Zone (Bottom 40%) -->
<div class="w-full h-[40%] max-w-[300px] flex flex-col items-center justify-start relative px-gutter pt-12">
<!-- Aura Breathing Wave (Idle State) -->
<div class="relative w-full h-24 flex items-center justify-center">
<svg class="w-full h-full" viewbox="0 0 300 100">
<!-- The Wave Path (Aura Teal 8px) -->
<path class="aura-pulse" d="M 0 50 C 75 50, 75 80, 150 80 C 225 80, 225 50, 300 50" fill="transparent" stroke="#008080" stroke-linecap="round" stroke-width="8"></path>
<!-- The Nexus Core (Vital Emerald Circle) -->
<circle class="vital-emerald-glow" cx="150" cy="80" fill="#50C878" r="8"></circle>
</svg>
</div>
<!-- Vault and Pulse Icons (Minimalist Interaction points) -->
<div class="flex justify-between w-full mt-8 opacity-40 px-4">
<div class="flex flex-col items-center gap-1 group cursor-pointer">
<span class="material-symbols-outlined text-on-surface-variant group-hover:text-aura-teal transition-colors duration-300">shield</span>
</div>
<div class="flex flex-col items-center gap-1 group cursor-pointer">
<span class="material-symbols-outlined text-vital-emerald group-hover:text-aura-teal transition-colors duration-300">graphic_eq</span>
</div>
</div>
</div>
</main>
<!-- BottomNavBar Shell -->
<nav class="fixed bottom-0 w-full z-50 flex justify-around items-center px-gutter pb-8 h-24 max-w-[300px] mx-auto left-0 right-0 bg-background/80 backdrop-blur-md rounded-t-xl">
<div class="flex flex-col items-center justify-center text-on-surface-variant opacity-40 hover:text-aura-teal transition-all duration-300 cursor-pointer">
<span class="material-symbols-outlined">shield</span>
</div>
<!-- Active Tab: Graphic EQ (Representing the Pulse/Breathing Wave state) -->
<div class="flex flex-col items-center justify-center text-vital-emerald scale-110 active:scale-125 transition-transform duration-300 ease-out cursor-pointer">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">graphic_eq</span>
</div>
<div class="flex flex-col items-center justify-center text-on-surface-variant opacity-40 hover:text-aura-teal transition-all duration-300 cursor-pointer">
<span class="material-symbols-outlined">timeline</span>
</div>
</nav>
<!-- Visual Polish: Sub-tonal background elements for "Tonal Emergence" -->
<div class="fixed inset-0 pointer-events-none z-[-1] opacity-20">
<div class="absolute top-1/4 left-1/2 -translate-x-1/2 w-96 h-96 bg-primary-container/10 blur-[120px] rounded-full"></div>
</div>
