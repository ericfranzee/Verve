<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&amp;display=swap" rel="stylesheet"/>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

      tailwind.config = {
        darkMode: "class",

          extend: {
            "colors": {

                    "primary-fixed-dim": "#76d6d5",
                    "aura-teal": "#008080",
                    "surface-dim": "#101414",
                    "text-primary": "#FFFFFF",
                    "tertiary-container": "#a96039",
                    "error-container": "#93000a",
                    "on-tertiary-container": "#fff9f7",
                    "on-secondary-fixed": "#00210c",
                    "on-primary": "#003737",
                    "tertiary-fixed": "#ffdbcb",
                    "tertiary-fixed-dim": "#ffb692",
                    "secondary": "#66dd8b",
                    "secondary-container": "#25a55a",
                    "surface-tint": "#76d6d5",
                    "surface-container-low": "#181c1c",
                    "inverse-surface": "#dfe3e2",

                    "outline": "#879392",

                    "on-tertiary-fixed": "#341100",
                    "outline-variant": "#3e4949",
                    "on-secondary": "#003919",
                    "surface-container": "#1c2020",
                    "secondary-fixed": "#83fba5",
                    "tertiary": "#ffb692",
                    "surface-container-highest": "#313635",
                    "on-primary-container": "#e3fffe",
                    "secondary-fixed-dim": "#66dd8b",
                    "background": "#000000",
                    "on-secondary-fixed-variant": "#005227",
                    "primary-container": "#008080",
                    "on-error": "#690005",
                    "on-surface-variant": "#bdc9c8",
                    "surface-bright": "#353a3a",

                    "on-primary-fixed-variant": "#004f4f",

            "borderRadius": {
                    "DEFAULT": "1rem",

                    "full": "9999px"

            "spacing": {
                    "tagline-margin-top": "0.5rem",
                    "title-margin-top": "2rem",
                    "section-gap": "3rem",
                    "container-max": "300px",
                    "gutter": "1rem"
            },
            "fontFamily": {
                    "brand-tagline": ["Inter"],
                    "body-md": ["Inter"],
                    "label-sm": ["Inter"],

                    "label-sm": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05rem", "fontWeight": "500"}],

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 200, 'GRAD' 0, 'opsz' 48;
        }
        /* Custom "Pulse" animation specifically for the Aura Teal interaction element */
        @keyframes aura-pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 0.4; border-width: 12px; }
            100% { transform: scale(1); opacity: 0.8; }
        }
        .animate-aura-pulse {
            animation: aura-pulse 3s infinite ease-in-out;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col items-center overflow-hidden">
<!-- TopAppBar - Suppressed text links for Transactional/Onboarding focus -->
<header class="fixed top-0 w-full h-16 px-gutter flex justify-center items-center z-50 bg-background">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-2xl" data-icon="bubble_chart">bubble_chart</span>
<h1 class="font-brand-title text-brand-title text-primary tracking-[0.5rem]">VERVE</h1>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 w-full max-w-[300px] flex flex-col items-center justify-center text-center px-gutter">
<!-- The Pulse Interface Element -->
<div class="relative flex items-center justify-center mb-16">
<!-- Aura Teal outer ring (The Pulse) -->
<div class="w-48 h-48 rounded-full border-[8px] border-aura-teal animate-aura-pulse flex items-center justify-center">
<!-- Inner Nexus (The Core) -->
<div class="w-4 h-4 rounded-full bg-vital-emerald shadow-[0_0_20px_rgba(80,200,120,0.6)]"></div>
</div>
<!-- Fingerprint/Biometric Icon -->
<div class="absolute flex flex-col items-center justify-center">
<span class="material-symbols-outlined text-primary text-6xl opacity-80" data-icon="fingerprint">fingerprint</span>
</div>
</div>
<!-- Typography Stack -->
<div class="space-y-6">
<h2 class="font-headline-lg text-headline-lg text-text-primary tracking-tight">
                Initiating Zero-Knowledge Handshake.
            </h2>
<p class="font-brand-tagline text-brand-tagline text-on-surface-variant uppercase">
                Hold your device naturally to begin biometric sync.
            </p>
</div>
<!-- Progress Indicator (Low-fidelity visual feedback) -->
<div class="mt-24 flex gap-3">
<div class="h-1 w-8 rounded-full bg-aura-teal"></div>
<div class="h-1 w-8 rounded-full bg-surface-variant/30"></div>
<div class="h-1 w-8 rounded-full bg-surface-variant/30"></div>
</div>
</main>
<!-- Footer Identity (No Nav Shell for Transactional Onboarding) -->
<footer class="pb-12 pt-4">
<div class="flex flex-col items-center">
<div class="w-1 h-8 bg-gradient-to-b from-aura-teal to-transparent rounded-full"></div>
<p class="mt-4 font-label-sm text-label-sm text-on-surface-variant/40 tracking-[0.3rem] uppercase">
                SECURED BY NEXUS CORE
            </p>
</div>
</footer>
<!-- Decorative Atmosphere Elements -->
<div class="fixed inset-0 pointer-events-none overflow-hidden z-[-1]">
<!-- Subtle gradient glow at bottom -->
<div class="absolute bottom-[-20%] left-1/2 -translate-x-1/2 w-[500px] h-[500px] bg-aura-teal/5 blur-[120px] rounded-full"></div>
</div>
</body></html>
