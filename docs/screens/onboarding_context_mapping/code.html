<body class="bg-background text-on-surface font-body-md selection:bg-aura-teal/30">
<!-- TopAppBar Navigation Shell -->
<header class="fixed top-0 w-full z-50 flex justify-center items-center h-16 px-gutter bg-background transition-opacity duration-500">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-primary text-2xl" data-icon="bubble_chart">bubble_chart</span>
<h1 class="font-brand-title text-brand-title text-primary tracking-[0.5rem]">VERVE</h1>
</div>
</header>
<main class="min-h-screen flex flex-col items-center pt-24 pb-32 px-gutter">
<div class="w-full max-w-[300px] flex flex-col items-center">
<!-- Aura Wave Interface (The Pulse) -->
<div class="w-full h-24 mb-title-margin-top flex items-center justify-center relative">
<svg class="w-full overflow-visible" viewbox="0 0 300 60">
<path class="pulse-wave" d="M0 30 Q75 10 150 30 T300 30" fill="none" stroke="#008080" stroke-linecap="round" stroke-width="8"></path>
<!-- Nexus Core -->
<circle class="animate-pulse" cx="150" cy="35" fill="#50C878" r="6"></circle>
</svg>
</div>
<!-- Aura Voice Context -->
<section class="text-center mb-section-gap">
<p class="font-headline-lg text-headline-lg text-on-surface leading-relaxed italic">
                    "I'm ready to learn your rhythm. Where shall we anchor your first provisioning event?"
                </p>
</section>
<!-- Cognitive Preferences Ledger -->
<section class="w-full flex flex-col gap-8">
<div class="flex justify-between items-end border-b border-surface-variant pb-2">
<span class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-widest">Cognitive Preferences</span>
<span class="font-label-sm text-label-sm text-primary">03 / 12</span>
</div>
<div class="flex flex-col gap-6 w-full">
<!-- Preference Item 1 -->
<button class="flex flex-col items-start w-full group transition-all duration-300">
<div class="flex justify-between w-full items-center mb-1">
<span class="ledger-mono text-primary text-[14px] tracking-tighter">[DIETARY]</span>
<span class="font-label-sm text-label-sm text-surface-variant uppercase">Pending</span>
</div>
<div class="w-full h-[8px] bg-surface-container rounded-full overflow-hidden">
<div class="h-full bg-surface-variant w-1/4 group-hover:bg-aura-teal transition-colors"></div>
</div>
</button>
<!-- Preference Item 2 -->
<button class="flex flex-col items-start w-full group transition-all duration-300">
<div class="flex justify-between w-full items-center mb-1">
<span class="ledger-mono text-primary text-[14px] tracking-tighter">[FULFILLMENT HUB]</span>
<span class="font-label-sm text-label-sm text-surface-variant uppercase">Pending</span>
</div>
<div class="w-full h-[8px] bg-surface-container rounded-full overflow-hidden">
<div class="h-full bg-surface-variant w-1/6 group-hover:bg-aura-teal transition-colors"></div>
</div>
</button>
<!-- Preference Item 3 -->
<button class="flex flex-col items-start w-full group transition-all duration-300">
<div class="flex justify-between w-full items-center mb-1">
<span class="ledger-mono text-primary text-[14px] tracking-tighter">[PAYMENT CASCADE]</span>
<span class="font-label-sm text-label-sm text-surface-variant uppercase">Pending</span>
</div>
<div class="w-full h-[8px] bg-surface-container rounded-full overflow-hidden">
<div class="h-full bg-surface-variant w-1/3 group-hover:bg-aura-teal transition-colors"></div>
</div>
</button>
</div>
</section>

<div class="mt-section-gap w-full flex justify-center">
<button class="border-2 border-aura-teal px-8 py-3 rounded-full group hover:bg-aura-teal transition-all duration-500">
<span class="font-label-sm text-label-sm text-text-primary uppercase tracking-[0.2rem]">Initiate Sync</span>
